[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "memctl"
version = "0.1.0"
description = "Tool-bound automatic memory recall for Claude Code"
requires-python = ">=3.10"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "Juan Pablo Carranza Hurtado" }]
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8"]

[project.scripts]
memctl = "memctl.__main__:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["memctl*"]
