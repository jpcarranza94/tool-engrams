name: tests

on:
  push:
    branches: [main]
  pull_request:

# Default token is read-only by repo setting; declare it so least-privilege
# survives a settings change.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded PR runs, but never a main run mid-flight (a cancelled
  # main run leaves a misleading badge).
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        # Floor (pyproject requires-python) + current.
        python: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -e ".[dev]"
      # addopts in pyproject already excludes the e2e marker (spawns real
      # `claude -p` sessions — no auth on runners, costs money).
      - run: pytest -q

  # Headless end-to-end of install.sh on a clean HOME: preflight, pip install,
  # settings.json surgery, DB init + doctor, the tty-gated schedule prompt
  # (stdin is /dev/null — this job pins the "read -p killed headless installs"
  # fix behaviorally), then uninstall.
  install-smoke:
    strategy:
      fail-fast: false
      matrix:
        # ubuntu exercises the cron branch of the schedule step; macos the
        # launchd branch — and macOS is the platform the maintainer runs.
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Stub claude CLI (installer preflight requires >= 2.1.117)
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          printf '#!/bin/sh\necho "2.1.170 (Claude Code)"\n' > "$RUNNER_TEMP/bin/claude"
          chmod +x "$RUNNER_TEMP/bin/claude"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
      - name: Headless install into a clean HOME
        run: |
          export HOME="$RUNNER_TEMP/home"
          mkdir -p "$HOME"
          bash install.sh < /dev/null
      - name: Doctor passes after install
        run: |
          export HOME="$RUNNER_TEMP/home"
          engram doctor
      - name: Uninstall leaves settings clean
        run: |
          export HOME="$RUNNER_TEMP/home"
          bash install.sh --uninstall
          # Raw-text assert: stronger than re-using the uninstaller's own
          # startswith('engram ') predicate (a shared blind spot would pass
          # both), and it covers the Bash(engram *) permission too.
          python3 - <<'EOF'
          import os
          text = open(os.path.expanduser('~/.claude/settings.json')).read()
          assert 'engram' not in text, text
          EOF
